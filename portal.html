<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模擬試験 管理システム</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .portal-header {
      background: var(--primary);
      color: #fff;
      padding: 48px 20px 40px;
      text-align: center;
    }
    .portal-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .portal-header p {
      font-size: 0.9rem;
      opacity: 0.75;
    }

    .portal-body {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 20px 60px;
    }

    .portal-section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }
    @media (max-width: 520px) {
      .portal-grid { grid-template-columns: 1fr; }
    }

    .portal-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .portal-card.available {
      cursor: pointer;
      border-color: var(--primary-lt);
    }
    .portal-card.available:hover {
      box-shadow: 0 4px 20px rgba(30,64,175,0.13);
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .portal-card.available::after {
      content: "→";
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      color: var(--primary-lt);
      transition: right 0.15s, color 0.15s;
    }
    .portal-card.available:hover::after {
      right: 16px;
      color: var(--primary);
    }

    .portal-card.coming-soon {
      cursor: not-allowed;
      opacity: 0.55;
      background: var(--bg);
    }

    .card-grade {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-bg);
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      width: fit-content;
    }
    .portal-card.coming-soon .card-grade {
      color: var(--text-muted);
      background: var(--border);
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.35;
      margin-top: 4px;
    }

    .card-category {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .card-status {
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      width: fit-content;
    }
    .status-active {
      background: #dcfce7;
      color: #15803d;
    }
    .status-soon {
      background: var(--border);
      color: var(--text-muted);
    }

    .portal-footer {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="portal-header">
  <h1>施工管理技士 模擬試験システム</h1>
  <p>試験の種別を選択してください</p>
</div>

<div class="portal-body">

  <div class="portal-section-label">建築施工管理技士</div>
  <div class="portal-grid">

    <a href="index.html" class="portal-card available">
      <span class="card-grade">1級</span>
      <div class="card-name">建築施工管理技士</div>
      <div class="card-category">一次試験　全72問</div>
      <span class="card-status status-active">利用可能</span>
    </a>

    <div class="portal-card coming-soon">
      <span class="card-grade">2級</span>
      <div class="card-name">建築施工管理技士</div>
      <div class="card-category">一次試験</div>
      <span class="card-status status-soon">準備中</span>
    </div>

  </div>

  <div class="portal-section-label">土木施工管理技士</div>
  <div class="portal-grid">

    <div class="portal-card coming-soon">
      <span class="card-grade">1級</span>
      <div class="card-name">土木施工管理技士</div>
      <div class="card-category">一次試験</div>
      <span class="card-status status-soon">準備中</span>
    </div>

    <div class="portal-card coming-soon">
      <span class="card-grade">2級</span>
      <div class="card-name">土木施工管理技士</div>
      <div class="card-category">一次試験</div>
      <span class="card-status status-soon">準備中</span>
    </div>

  </div>

</div>

<div class="portal-footer">
  建施・土木 模擬試験 管理システム
</div>

</body>
</html>
