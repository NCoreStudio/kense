<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施工管理技士 模擬試験システム</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

    /* ---- パスワード画面 ---- */
    #pg-login {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-logo {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .login-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .login-box .field { text-align: left; margin-bottom: 16px; }
    .login-box input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-box input[type="password"]:focus { border-color: var(--primary); }
    .login-error {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ---- ポータル画面 ---- */
    #pg-portal { display: none; flex-direction: column; flex: 1; }

    .portal-header {
      background: var(--primary);
      color: #fff;
      padding: 40px 20px 36px;
      text-align: center;
    }
    .portal-header h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .portal-header p  { font-size: 0.85rem; opacity: 0.75; }

    .portal-body {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 36px 20px 60px;
    }

    .portal-section-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-left: 4px;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 36px;
    }
    @media (max-width: 520px) { .portal-grid { grid-template-columns: 1fr; } }

    .portal-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.15s;
    }
    .portal-card.available {
      border-color: var(--primary-lt);
      cursor: pointer;
    }
    .portal-card.available:hover {
      box-shadow: 0 4px 20px rgba(30,64,175,0.13);
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .portal-card.available::after {
      content: "→";
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--primary-lt);
      transition: right 0.15s, color 0.15s;
    }
    .portal-card.available:hover::after { right: 14px; color: var(--primary); }
    .portal-card.coming-soon { opacity: 0.5; background: var(--bg); cursor: not-allowed; }

    .card-grade {
      font-size: 0.78rem; font-weight: 700;
      color: var(--primary); background: var(--primary-bg);
      display: inline-block; padding: 2px 10px;
      border-radius: 100px; width: fit-content;
    }
    .portal-card.coming-soon .card-grade { color: var(--text-muted); background: var(--border); }
    .card-name { font-size: 1rem; font-weight: 800; line-height: 1.35; margin-top: 4px; }
    .card-category { font-size: 0.76rem; color: var(--text-muted); }
    .card-status {
      margin-top: 8px; font-size: 0.73rem; font-weight: 700;
      padding: 2px 10px; border-radius: 100px; width: fit-content;
    }
    .status-active { background: #dcfce7; color: #15803d; }
    .status-soon   { background: var(--border); color: var(--text-muted); }

    .portal-footer {
      text-align: center; padding: 18px;
      font-size: 0.76rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .logout-btn {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.18); color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: var(--radius); padding: 5px 14px;
      font-size: 0.78rem; cursor: pointer;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.28); }
  </style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pg-login">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">施工管理技士 模擬試験システム</div>
    <div class="login-sub">パスワードを入力してください</div>
    <input type="password" id="pw-input" placeholder="••••••"
      onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-error" id="pw-error"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="doLogin()">
      ログイン
    </button>
  </div>
</div>

<!-- ポータル画面 -->
<div id="pg-portal">
  <div class="portal-header" style="position:relative">
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    <h1>施工管理技士 模擬試験システム</h1>
    <p>試験の種別を選択してください</p>
  </div>

  <div class="portal-body">

    <div class="portal-section-label">建築施工管理技士</div>
    <div class="portal-grid">
      <a href="kense1/admin.html" class="portal-card available">
        <span class="card-grade">1級</span>
        <div class="card-name">建築施工管理技士</div>
        <div class="card-category">一次試験　全72問</div>
        <span class="card-status status-active">利用可能</span>
      </a>
      <div class="portal-card coming-soon">
        <span class="card-grade">2級</span>
        <div class="card-name">建築施工管理技士</div>
        <div class="card-category">一次試験</div>
        <span class="card-status status-soon">準備中</span>
      </div>
    </div>

    <div class="portal-section-label">土木施工管理技士</div>
    <div class="portal-grid">
      <a href="doko1/admin.html" class="portal-card available">
        <span class="card-grade">1級</span>
        <div class="card-name">土木施工管理技士</div>
        <div class="card-category">一次試験　全101問</div>
        <span class="card-status status-active">利用可能</span>
      </a>
      <div class="portal-card coming-soon">
        <span class="card-grade">2級</span>
        <div class="card-name">土木施工管理技士</div>
        <div class="card-category">一次試験</div>
        <span class="card-status status-soon">準備中</span>
      </div>
    </div>

  </div>

  <div class="portal-footer">施工管理技士 模擬試験システム</div>
</div>

<script>
const PORTAL_PASSWORD = "017663";
const SESSION_KEY     = "portal_auth";

function doLogin() {
  const pw = document.getElementById("pw-input").value;
  if (pw === PORTAL_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, "1");
    sessionStorage.setItem("admin_ok", "1");
    showPortal();
  } else {
    document.getElementById("pw-error").textContent = "パスワードが違います";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem("admin_ok");
  document.getElementById("pg-portal").style.display = "none";
  document.getElementById("pg-login").style.display  = "flex";
  document.getElementById("pw-input").value = "";
}

function showPortal() {
  document.getElementById("pg-login").style.display  = "none";
  document.getElementById("pg-portal").style.display = "flex";
}

// セッション済みなら直接ポータルへ
if (sessionStorage.getItem(SESSION_KEY) === "1") showPortal();

document.getElementById("pw-input").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
